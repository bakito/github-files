name: Sync Files
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run GitHub File Sync
        uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1.21.1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
          GIT_USERNAME: "github-files"
          GIT_EMAIL: "files@github.com"
          CONFIG_PATH: sync.yml
          COMMIT_PREFIX: 'chore: '
          COMMIT_BODY: 'Signed-off-by: github-files <files@github.com>'
