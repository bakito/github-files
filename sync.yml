group:
  # govulncheck
  - files:
      - source: workflow/govulncheck.yaml
        dest: .github/workflows/govulncheck.yaml
    repos: |
      bakito/adguardhome-sync
      bakito/emoji
      bakito/gws
      bakito/toolbox
      bakito/vault-unsealer
      bakito/volumio-tui

  # golangci-lint
  - files:
      - source: golangci-lint/default.yaml
        dest: .golangci.yaml
    repos: |
      bakito/emoji
      bakito/gws
      bakito/volumio-tui

  # golangci-lint without depguard
  - files:
      - source: golangci-lint/without-depguard.yaml
        dest: .golangci.yaml
    repos: |
      bakito/adguardhome-sync
      bakito/toolbox
      bakito/vault-unsealer
  # Funding
  - files:
      - source: .github/FUNDING.yml
        dest: .github/FUNDING.yml
    repos: |
      bakito/adguardhome-sync
